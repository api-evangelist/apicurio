aid: apicurio
name: Apicurio
description: >-
  Apicurio is an open source API and schema tooling platform maintained by Red
  Hat under the Apache 2.0 license. It includes Apicurio Registry (a high-performance
  schema and API design registry), Apicurio Studio (a visual API designer for OpenAPI
  and AsyncAPI), Apicurio Data Models (a data modeling library), Apicurio Codegen
  (Java code generation from OpenAPI), and Apicurito (an embedded API editor).
type: Index
